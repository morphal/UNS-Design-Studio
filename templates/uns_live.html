<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNS Live View — UNS Design Studio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1c2128;
      --surface3:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #e3b341;
      --red:       #f85149;
      --purple:    #a371f7;
      --orange:    #f0883e;
    }

    html, body {
      height: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 18px }
    .title { font-size: 14px; font-weight: 600; letter-spacing: .3px }
    .subtitle { font-size: 11px; color: var(--muted) }
    .hspace { flex: 1 }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      flex-shrink: 0;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 5px;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green) }
    .dot.red   { background: var(--red) }
    .dot.yellow { background: var(--yellow); animation: pulse 1s infinite }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .stat { color: var(--muted) }
    .stat strong { color: var(--text) }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - 48px - 34px);
      overflow: hidden;
    }

    /* ── Config panel ── */
    .config-panel {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-hdr {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }
    .cfg-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .fg label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font: inherit;
      font-size: 12px;
      padding: 6px 10px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent) }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px }
    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85 }
    .btn-primary { background: var(--accent); color: #0d1117 }
    .btn-danger  { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3) }
    .btn-row { display: flex; gap: 8px; padding: 0 14px 14px }

    /* ── Tree panel ── */
    .tree-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tree-toolbar {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }
    .tree-toolbar input {
      flex: 1;
      padding: 5px 10px;
      font-size: 12px;
    }
    .tree-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 6px 4px;
    }

    /* ── Tree nodes ── */
    .t-node { user-select: none }
    .t-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px 3px 0;
      border-radius: 5px;
      cursor: pointer;
      min-height: 26px;
      transition: background .1s;
    }
    .t-row:hover { background: var(--surface2) }
    .t-row.flash { background: rgba(88,166,255,.12) }
    .t-exp {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: var(--muted); flex-shrink: 0;
      border-radius: 3px;
    }
    .t-exp:hover { background: var(--surface3); color: var(--text) }
    .t-exp.inv { visibility: hidden }
    .t-icon { font-size: 12px; flex-shrink: 0 }
    .t-name {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 12px; color: var(--text);
    }
    .t-name.leaf { color: var(--accent) }
    .t-val {
      font-size: 11px;
      color: var(--green);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .t-val.str  { color: var(--yellow) }
    .t-val.bool { color: var(--purple) }
    .t-val.num  { color: var(--green) }
    .t-age {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
      min-width: 30px;
      text-align: right;
    }
    .t-children {
      border-left: 1px solid var(--surface3);
      margin-left: 17px;
    }

    /* ── Detail panel (bottom of config panel) ── */
    .detail-panel {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }
    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      font-size: 11px;
    }
    .detail-empty {
      color: var(--muted);
      text-align: center;
      padding: 20px;
      font-size: 11px;
    }
    .detail-topic {
      font-size: 11px;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 10px;
      padding: 6px 8px;
      background: var(--surface3);
      border-radius: 5px;
      border: 1px solid var(--border);
    }
    .detail-val {
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 12px;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 160px;
      overflow-y: auto;
    }
    .detail-meta {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
    }
    .detail-row .dk { color: var(--muted) }
    .detail-row .dv { color: var(--text) }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px }
  </style>
</head>
<body>

<header>
  <span class="logo">📡</span>
  <div>
    <div class="title">UNS Live View</div>
    <div class="subtitle">Real-time topic tree via MQTT over WebSocket</div>
  </div>
  <div class="hspace"></div>
  <a href="/" style="color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:5px">← Dashboard</a>
  <a href="/uns" style="color:var(--muted);font-size:12px;text-decoration:none;border:1px solid var(--border);padding:5px 10px;border-radius:5px">🌐 Designer</a>
</header>

<div class="statusbar">
  <span><span class="dot" id="dot"></span><span id="status-txt">Disconnected</span></span>
  <span class="stat">Topics: <strong id="stat-topics">0</strong></span>
  <span class="stat">Messages: <strong id="stat-msgs">0</strong></span>
  <span class="stat">Rate: <strong id="stat-rate">0</strong> msg/s</span>
  <span class="stat" id="stat-last" style="display:none">Last: <strong id="stat-last-txt">—</strong></span>
</div>

<div class="layout">

  <!-- Left: config + detail -->
  <div class="config-panel">
    <div class="panel-hdr">MQTT Connection</div>
    <div class="cfg-body">
      <div class="row2">
        <div class="fg">
          <label>Host</label>
          <input id="cfg-host" value="localhost">
        </div>
        <div class="fg">
          <label>WebSocket Port</label>
          <input id="cfg-port" type="number" value="8083">
        </div>
      </div>
      <div class="fg">
        <label>WS Path</label>
        <input id="cfg-path" value="/mqtt">
      </div>
      <div class="fg">
        <label>Subscribe Topic</label>
        <input id="cfg-topic" value="GlobalFoodCo/#">
      </div>
      <div class="row2">
        <div class="fg">
          <label>Username (optional)</label>
          <input id="cfg-user" placeholder="—">
        </div>
        <div class="fg">
          <label>Password (optional)</label>
          <input id="cfg-pass" type="password" placeholder="—">
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-connect" onclick="connect()" style="flex:1">▶ Connect</button>
      <button class="btn btn-danger" id="btn-disconnect" onclick="disconnect()" style="flex:1;display:none">■ Disconnect</button>
      <button class="btn" onclick="clearTree()" style="background:var(--surface3);border:1px solid var(--border);color:var(--muted)">Clear</button>
    </div>

    <!-- Selected node detail -->
    <div class="detail-panel">
      <div class="panel-hdr">Selected Topic</div>
      <div class="detail-body" id="detail-body">
        <div class="detail-empty">Click any leaf node to inspect its value</div>
      </div>
    </div>
  </div>

  <!-- Right: live tree -->
  <div class="tree-panel">
    <div class="tree-toolbar">
      <input type="search" id="srch" placeholder="🔍 Filter topics…" oninput="filterTree(this.value)">
      <span style="font-size:11px;color:var(--muted);white-space:nowrap" id="tree-count">0 leaves</span>
    </div>
    <div class="tree-scroll" id="tree-root"></div>
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let client      = null;
let treeData    = {};     // nested: {children:{}, value:null, ts:0, msgCount:0}
let expanded    = new Set();
let selected    = null;
let filterQ     = '';
let msgCount    = 0;
let leafCount   = 0;
let rateCounter = 0;
let rateDisplay = 0;

// ── Stats ──────────────────────────────────────────────────────────────────────
setInterval(() => {
  rateDisplay = rateCounter;
  rateCounter = 0;
  document.getElementById('stat-rate').textContent = rateDisplay;
}, 1000);

function eid(id) { return document.getElementById(id) }

// ── Connection ─────────────────────────────────────────────────────────────────
function connect() {
  const host  = eid('cfg-host').value.trim() || 'localhost';
  const port  = parseInt(eid('cfg-port').value) || 8083;
  const path  = eid('cfg-path').value.trim() || '/mqtt';
  const user  = eid('cfg-user').value.trim();
  const pass  = eid('cfg-pass').value;
  const topic = eid('cfg-topic').value.trim() || '#';

  setStatus('yellow', 'Connecting…');

  const opts = {
    clientId:       'uns-live-' + Math.random().toString(16).substr(2, 8),
    clean:          true,
    reconnectPeriod: 3000,
  };
  if (user) { opts.username = user; opts.password = pass; }

  const url = `ws://${host}:${port}${path}`;
  client = mqtt.connect(url, opts);

  client.on('connect', () => {
    setStatus('green', `Connected — ${host}:${port}`);
    eid('btn-connect').style.display    = 'none';
    eid('btn-disconnect').style.display = '';
    client.subscribe(topic, { qos: 0 });
  });

  client.on('message', (t, msg) => {
    msgCount++;
    rateCounter++;
    eid('stat-msgs').textContent = msgCount;
    eid('stat-last').style.display = '';
    eid('stat-last-txt').textContent = t.split('/').pop();
    handleMessage(t, msg.toString());
  });

  client.on('error', (e) => {
    setStatus('red', 'Error: ' + e.message);
  });

  client.on('close', () => {
    setStatus('red', 'Disconnected');
    eid('btn-connect').style.display    = '';
    eid('btn-disconnect').style.display = 'none';
  });
}

function disconnect() {
  if (client) { client.end(true); client = null; }
  setStatus('', 'Disconnected');
  eid('btn-connect').style.display    = '';
  eid('btn-disconnect').style.display = 'none';
}

function setStatus(color, txt) {
  const dot = eid('dot');
  dot.className = 'dot' + (color ? ' ' + color : '');
  eid('status-txt').textContent = txt;
}

// ── Tree data ──────────────────────────────────────────────────────────────────
function handleMessage(topic, payload) {
  const parts = topic.split('/');
  let node    = treeData;
  let isNew   = false;

  parts.forEach((part, i) => {
    if (!node[part]) {
      node[part] = { children: {}, value: null, ts: 0, count: 0, isLeaf: false };
      isNew = true;
    }
    if (i === parts.length - 1) {
      node[part].isLeaf = true;
      node[part].value  = payload;
      node[part].ts     = Date.now();
      node[part].count  = (node[part].count || 0) + 1;
      node[part].topic  = topic;
    }
    node = node[part].children;
  });

  if (isNew) {
    leafCount = countLeaves(treeData);
    eid('stat-topics').textContent = leafCount;
    eid('tree-count').textContent  = leafCount + ' leaves';
  }

  renderTree();
  flashNode(topic);

  // Refresh detail if this topic is selected
  if (selected === topic) showDetail(topic);
}

function countLeaves(node) {
  return Object.values(node).reduce((sum, n) => {
    return sum + (n.isLeaf ? 1 : 0) + countLeaves(n.children);
  }, 0);
}

function clearTree() {
  treeData  = {};
  msgCount  = 0;
  leafCount = 0;
  selected  = null;
  expanded.clear();
  eid('stat-topics').textContent = 0;
  eid('stat-msgs').textContent   = 0;
  eid('tree-count').textContent  = '0 leaves';
  eid('detail-body').innerHTML   = '<div class="detail-empty">Click any leaf node to inspect its value</div>';
  renderTree();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderTree() {
  const root = eid('tree-root');
  root.innerHTML = '';
  Object.entries(treeData).forEach(([key, node]) => {
    const el = buildNode(key, node, 0, key);
    if (el) root.appendChild(el);
  });
}

function buildNode(key, node, depth, path) {
  const hasChildren = Object.keys(node.children).length > 0;
  const isLeaf      = node.isLeaf;
  const isExp       = expanded.has(path);

  // Filter
  if (filterQ && !pathMatchesFilter(path, node)) return null;

  const wrap = document.createElement('div');
  wrap.className = 't-node';

  const row = document.createElement('div');
  row.className = 't-row' + (selected === path ? ' sel' : '');
  row.style.paddingLeft = (depth * 16 + 6) + 'px';
  row.dataset.path = path;

  // Value display
  let valHtml = '';
  let valClass = 'num';
  if (isLeaf && node.value !== null) {
    let displayVal = node.value;
    try {
      const parsed = JSON.parse(node.value);
      if (typeof parsed === 'object' && parsed !== null) {
        // Show the 'value' field if it exists, otherwise first field
        const v = parsed.value ?? parsed.v ?? Object.values(parsed)[0];
        displayVal = v !== undefined ? String(v) : '{…}';
      } else {
        displayVal = String(parsed);
      }
      if (typeof parsed.value === 'string' || typeof parsed === 'string') valClass = 'str';
      else if (typeof parsed.value === 'boolean' || typeof parsed === 'boolean') valClass = 'bool';
    } catch(e) {
      displayVal = node.value.length > 30 ? node.value.slice(0, 30) + '…' : node.value;
      valClass = 'str';
    }
    valHtml = `<span class="t-val ${valClass}">${esc(displayVal)}</span>`;
  }

  // Age
  let ageHtml = '';
  if (isLeaf && node.ts) {
    const age = Math.floor((Date.now() - node.ts) / 1000);
    ageHtml = `<span class="t-age">${age < 60 ? age + 's' : Math.floor(age/60) + 'm'}</span>`;
  }

  const icon = isLeaf ? '◆' : (isExp ? '▾' : '▸');
  row.innerHTML = `
    <span class="t-exp${hasChildren ? '' : ' inv'}" onclick="toggleExp('${esc(path)}',event)">${isExp ? '▼' : '▶'}</span>
    <span class="t-icon" style="color:${isLeaf ? 'var(--accent)' : 'var(--muted)'}">${icon}</span>
    <span class="t-name${isLeaf ? ' leaf' : ''}">${esc(key)}</span>
    ${valHtml}
    ${ageHtml}
  `;

  if (isLeaf) {
    row.onclick = (e) => { if (!e.target.classList.contains('t-exp')) selectNode(path, node); };
  } else {
    row.onclick = (e) => { if (!e.target.classList.contains('t-exp')) toggleExp(path, e); };
  }

  wrap.appendChild(row);

  if (isExp && hasChildren) {
    const ch = document.createElement('div');
    ch.className = 't-children';
    Object.entries(node.children).forEach(([k, n]) => {
      const el = buildNode(k, n, depth + 1, path + '/' + k);
      if (el) ch.appendChild(el);
    });
    wrap.appendChild(ch);
  }

  return wrap;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleExp(path, e) {
  if (e) e.stopPropagation();
  expanded.has(path) ? expanded.delete(path) : expanded.add(path);
  renderTree();
}

function filterTree(q) {
  filterQ = q.trim().toLowerCase();
  renderTree();
}

function pathMatchesFilter(path, node) {
  if (!filterQ) return true;
  if (path.toLowerCase().includes(filterQ)) return true;
  if (node.isLeaf && node.value && node.value.toLowerCase().includes(filterQ)) return true;
  return Object.entries(node.children).some(([k, n]) => pathMatchesFilter(path + '/' + k, n));
}

// ── Flash animation on update ──────────────────────────────────────────────────
const flashSet = new Set();
function flashNode(topic) {
  if (flashSet.has(topic)) return;
  flashSet.add(topic);
  setTimeout(() => {
    const row = document.querySelector(`[data-path="${CSS.escape(topic)}"]`);
    if (row) {
      row.classList.add('flash');
      setTimeout(() => { row.classList.remove('flash'); flashSet.delete(topic); }, 400);
    } else {
      flashSet.delete(topic);
    }
  }, 50);
}

// ── Selected node detail ───────────────────────────────────────────────────────
function selectNode(path, node) {
  selected = path;
  renderTree();
  showDetail(path);
}

function showDetail(path) {
  // Find node
  const parts = path.split('/');
  let n = treeData;
  for (const p of parts) {
    if (!n[p]) return;
    n = n[p];
    if (n.children !== undefined && parts.indexOf(p) < parts.length - 1) n = n.children;
  }

  // Re-find correctly
  let cursor = treeData;
  let found  = null;
  for (let i = 0; i < parts.length; i++) {
    if (!cursor[parts[i]]) return;
    found  = cursor[parts[i]];
    cursor = found.children;
  }
  if (!found) return;

  const raw = found.value || '';
  let pretty = raw;
  try { pretty = JSON.stringify(JSON.parse(raw), null, 2); } catch(e) {}

  const age = found.ts ? Math.floor((Date.now() - found.ts) / 1000) : '—';

  eid('detail-body').innerHTML = `
    <div class="detail-topic">${esc(path)}</div>
    <pre class="detail-val">${esc(pretty)}</pre>
    <div class="detail-meta">
      <div class="detail-row"><span class="dk">Last update</span><span class="dv">${age}s ago</span></div>
      <div class="detail-row"><span class="dk">Messages received</span><span class="dv">${found.count || 1}</span></div>
      <div class="detail-row"><span class="dk">Topic depth</span><span class="dv">${path.split('/').length}</span></div>
    </div>
  `;
}

// ── Auto-refresh ages in detail ────────────────────────────────────────────────
setInterval(() => {
  if (selected) showDetail(selected);
  // Refresh age badges in tree (lightweight — just text nodes)
  renderTree();
}, 5000);

// ── Auto-expand first level ────────────────────────────────────────────────────
function autoExpand() {
  Object.keys(treeData).forEach(k => expanded.add(k));
  renderTree();
}

// ── Settings persistence ───────────────────────────────────────────────────────
const SETTINGS_KEY = 'uns-live-settings';

function saveSettings() {
  const settings = {
    host:  eid('cfg-host').value,
    port:  eid('cfg-port').value,
    path:  eid('cfg-path').value,
    topic: eid('cfg-topic').value,
    user:  eid('cfg-user').value,
    // password intentionally not persisted for security
  };
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.host)  eid('cfg-host').value  = s.host;
    if (s.port)  eid('cfg-port').value  = s.port;
    if (s.path)  eid('cfg-path').value  = s.path;
    if (s.topic) eid('cfg-topic').value = s.topic;
    if (s.user)  eid('cfg-user').value  = s.user;
  } catch(e) {}
}

// Save settings whenever any config field changes
['cfg-host','cfg-port','cfg-path','cfg-topic','cfg-user'].forEach(id => {
  const el = eid(id);
  if (el) el.addEventListener('input', saveSettings);
});

// Load saved settings on page load
loadSettings();
</script>
</body>
</html>
